services:
  calyx-backend:
    image: git.gurk.dev/gurk/calyx-backend:latest
    container_name: calyx-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/calyx.db
      - ENVIRONMENT=production

  calyx-frontend:
    image: git.gurk.dev/gurk/calyx-frontend:latest
    container_name: calyx-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - calyx-backend
